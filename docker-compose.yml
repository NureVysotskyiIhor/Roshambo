services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roshambo
    ports:
      - '5432:5432'
    volumes:
      - roshambo_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  roshambo_postgres_data:
